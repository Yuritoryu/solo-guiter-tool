<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Yuritoの考えた最強のソロギターツール(仮)</title>
<script>
  const APP_TITLE = "Yuritoの考えた最強のソロギターツール(仮)";
</script>

<style>
  :root{
    --ui-text:#111827;
    --ui-title:#0f172a;
    --ui-border:#d7deea;
    --ui-muted:#5b6475;
    --ui-accent:#2f6fed;
    --ui-accent-soft:rgba(47,111,237,.2);
    --ui-accent-strong:#2f6fed;
    --ui-bg:#f4f7fb;
    --ui-surface:#ffffff;
    --ui-surface-soft:#f8faff;
    --ui-body-grad-start:#eef4ff;
    --ui-body-grad-end:#f2f6fc;
    --ui-panel-head-border:#e8edf6;
    --ui-panel-head-start:#fbfdff;
    --ui-panel-head-end:#f3f7ff;
    --ui-panel-title:#1e293b;
    --ui-toggle-border:#d3dbeb;
    --ui-toggle-text:#2c3e66;
    --ui-field-border:#ced6e6;
    --ui-field-bg:#ffffff;
    --ui-field-text:#111827;
    --ui-pill-border:#cfd8e8;
    --ui-board-bg-start:#ffffff;
    --ui-board-bg-end:#f8fbff;
    --ui-svg-bg:#ffffff;
    --ui-svg-text:#111;
    --ui-fret-line:#333;
    --ui-string:#444;
    --ui-dot:#d9d9d9;
    --ui-footer:#666;
    --ui-btn-grad-start:#3f7df5;
    --ui-btn-grad-end:#2f6fed;

    --note-stroke:#cfd7e6;
    --note-stroke-strong:#223047;

    /* highlight fills */
    --fill-scale:#e7f0ff;   /* scale notes */
    --fill-chord:#ffe9be;   /* chord tones */
    --fill-both:#dff6df;    /* both scale + chord */

    /* marker colors */
    --mk-red:#e1524a;
    --mk-green:#2fb072;
    --mk-yellow:#e0b100;

    --shadow: 0 10px 30px rgba(17,24,39,.12);
  }

  html{
    scrollbar-gutter: stable;
  }
  body{
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    padding: 20px;
    background: radial-gradient(1400px 800px at 10% -20%, var(--ui-body-grad-start) 0%, var(--ui-bg) 55%, var(--ui-body-grad-end) 100%);
    color:var(--ui-text);
    overflow-y: scroll;
  }
  h1{ margin:0 0 14px; font-size:22px; color:var(--ui-title); }

  .card{
    border:1px solid var(--ui-border);
    border-radius:14px;
    padding:12px;
    padding-bottom:64px; /* reserve space for fixed export button */
    max-width:1200px;
    background:var(--ui-surface-soft);
    position:relative;
    box-shadow: 0 8px 24px rgba(15,23,42,.06);
  }

  /* Stacked windows */
  .panelWindow{
    border:1px solid var(--ui-border);
    border-radius:14px;
    background:var(--ui-surface);
    box-shadow:0 4px 14px rgba(15,23,42,.05);
    margin-bottom:10px;
    overflow:hidden;
  }
  .panelHead{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:10px 12px;
    border-bottom:1px solid var(--ui-panel-head-border);
    background:linear-gradient(180deg,var(--ui-panel-head-start) 0%,var(--ui-panel-head-end) 100%);
    cursor:pointer;
  }
  .panelTitle{
    font-size:14px;
    font-weight:800;
    color:var(--ui-panel-title);
  }
  .panelToggle{
    border:1px solid var(--ui-toggle-border);
    border-radius:999px;
    width:30px;
    height:30px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding:0;
    font-size:16px;
    line-height:1;
    font-weight:700;
    color:var(--ui-toggle-text);
    background:var(--ui-field-bg);
    cursor:pointer;
    transition:all .18s ease;
  }
  .panelToggle:hover{
    border-color:var(--ui-accent);
    box-shadow:0 0 0 3px var(--ui-accent-soft);
  }
  .panel{
    padding:10px 12px 12px;
    overflow:hidden;
    max-height: 720px;
    opacity:1;
    transition:max-height .26s ease, opacity .2s ease, padding .26s ease;
    will-change:max-height, opacity, padding;
  }
  .panel.is-hidden{
    max-height:0;
    opacity:0;
    padding-top:0;
    padding-bottom:0;
    pointer-events:none;
  }

  @media (prefers-reduced-motion: reduce){
    .panel{
      transition:none;
    }
  }

  .row{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    align-items:flex-end;
    margin:8px 0;
  }

  label{
    display:grid;
    gap:6px;
    font-size:14px;
    min-width:120px;
  }
  .rangeField{
    min-width: 280px;
  }
  .rangeInputs{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .rangeInputs input{
    width:88px;
  }
  .rangeSep{
    font-size:18px;
    color:var(--ui-muted);
    line-height:1;
  }
  #tuningSelectors{
    gap:10px;
  }
  #tuningSelectors label{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    min-width:80px;
  }
  #tuningSelectors select{
    width:auto;
    font-size:16px;
    padding:8px 10px;
  }
  /* Control-specific sizing */
  #viewStart, #viewEnd{
    width:40px;
  }
  #showNoteNames, #chordOn, #drawMode{
    width:118px;
  }
  #capoFret{
    width:118px;
  }
  #fretNumberMode{
    width:168px;
  }
  #capoHideLeftBtn{
    min-width:178px;
  }
  #scaleType{
    width:200px;
  }
  #scaleRoot, #chordRoot{
    width:98px;
  }
  #accMode{
    width:178px;
  }
  #chordQuality{
    width:186px;
  }
  #clearMarksBtn{
    min-width:132px;
  }
  #copyLinkBtn{
    min-width:138px;
  }
  #makePngBtn{
    min-width:116px;
  }
  #themePreset{
    width:150px;
    font-size:14px;
  }
  .themeLabel{
    font-size:14px;
    color:var(--ui-muted);
  }

  select, input, button{
    font-size:16px;
    padding:8px 10px;
    border:1px solid var(--ui-field-border);
    border-radius:10px;
    background:var(--ui-field-bg);
    color:var(--ui-field-text);
    outline:none;
  }
  option{
    color:var(--ui-field-text);
    background:var(--ui-field-bg);
  }
  select:focus, input:focus, button:focus{
    border-color:var(--ui-accent);
    box-shadow:0 0 0 3px var(--ui-accent-soft);
  }

  .btn{ cursor:pointer; }
  .btnPrimary{
    border-color:var(--ui-accent);
    background:linear-gradient(180deg,var(--ui-btn-grad-start) 0%, var(--ui-btn-grad-end) 100%);
    color:#fff;
    font-weight:700;
  }

  .pillGroup{
    display:flex;
    gap:8px;
    align-items:center;
    flex-wrap:wrap;
  }
  .pill{
    border:1px solid var(--ui-pill-border);
    background:var(--ui-field-bg);
    border-radius:999px;
    padding:8px 10px;
    font-size:14px;
    cursor:pointer;
    user-select:none;
  }
  .pill[aria-pressed="true"]{
    border-color:var(--ui-accent);
    box-shadow:0 0 0 3px var(--ui-accent-soft);
    font-weight:700;
  }

  .colorDot{
    width:14px;
    height:14px;
    border-radius:50%;
    display:inline-block;
    vertical-align:-2px;
    margin-right:6px;
    border:1px solid rgba(0,0,0,.15);
  }

  /* Bottom-right PNG button (always visible within tab window) */
  .exportBtnWrap{
    position:absolute;
    right:12px;
    bottom:12px;
    display:flex;
    gap:8px;
    align-items:center;
  }

  /* Fretboard */
  .boardWrap{
    max-width:1200px;
    margin-top:14px;
    border:1px solid var(--ui-border);
    border-radius:14px;
    padding:14px;
    background:linear-gradient(180deg,var(--ui-board-bg-start) 0%,var(--ui-board-bg-end) 100%);
    overflow-x:auto;
  }
  svg{
    display:block;
    width:auto;
    height:auto;
    max-width:none;
  }
  .siteFooter{
    max-width:1200px;
    margin-top:10px;
    font-size:12px;
    color:var(--ui-footer);
    text-align:right;
    letter-spacing:.02em;
  }

  /* Modal */
  .modalBack{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.35);
    display:none;
    align-items:center;
    justify-content:center;
    padding:16px;
    z-index:9999;
  }
  .modalBack.show{ display:flex; }
  .modal{
    width:min(980px, 100%);
    background:#fff;
    border-radius:16px;
    box-shadow: var(--shadow);
    border:1px solid rgba(0,0,0,.08);
    overflow:hidden;
  }
  .modalHead{
    padding:12px 14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:1px solid #eee;
    gap:10px;
  }
  .modalTitle{
    font-weight:800;
    font-size:14px;
    color:#111;
  }
  .modalBody{
    padding:14px;
    display:grid;
    gap:12px;
  }
  .modalActions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:flex-end;
  }
  .previewImg{
    width:100%;
    height:auto;
    border:1px solid #eee;
    border-radius:12px;
    background:#fafafa;
  }

  @media (max-width:860px){
    label{ min-width: 46%; }
    .rangeField{ min-width: 100%; }
    .rangeInputs input{ width:92px; }
    #tuningSelectors label{ min-width:84px; }
    #tuningSelectors select{ width:84px; }
    #showNoteNames, #scaleType, #chordOn, #drawMode, #capoFret, #fretNumberMode,
    #scaleRoot, #chordRoot, #accMode, #chordQuality{
      width:100%;
      min-width:0;
    }
    #clearMarksBtn, #copyLinkBtn, #capoHideLeftBtn{
      min-width:0;
      width:100%;
    }
    #themePreset{
      width:100%;
    }
  }
</style>
</head>

<body>
<h1 id="pageTitle">Yuritoの考えた最強のソロギターツール(仮)</h1>

<div class="card">
  <!-- 基本 -->
  <section class="panelWindow">
    <div class="panelHead" tabindex="0">
      <div class="panelTitle">基本</div>
      <button class="panelToggle" id="toggle-basic" type="button" aria-label="基本の表示切替" aria-expanded="true" aria-controls="panel-basic">－</button>
    </div>
    <div class="panel" id="panel-basic">
      <div style="font-size:14px;font-weight:700;color:var(--ui-panel-title);margin:2px 0 6px;">チューニング</div>
      <div class="row" id="tuningSelectors"></div>

      <div class="row">
        <label class="rangeField">フレット表示範囲
          <div class="rangeInputs">
            <input id="viewStart" aria-label="フレット表示範囲 始点" type="number" min="1" max="36" step="1" value="1" />
            <span class="rangeSep" aria-hidden="true">～</span>
            <input id="viewEnd" aria-label="フレット表示範囲 終点" type="number" min="1" max="36" step="1" value="12" />
          </div>
        </label>

        <label>音名表記
          <select id="showNoteNames">
            <option value="abc">ABC</option>
            <option value="solfege">ドレミ</option>
            <option value="off">オフ</option>
          </select>
        </label>

        <label>調号表記
          <select id="accMode">
            <option value="sharp">#で統一 (C#)</option>
            <option value="flat">bで統一 (Db)</option>
            <option value="both">両方 (C#/Db)</option>
          </select>
        </label>
      </div>
    </div>
  </section>

  <!-- カポタスト -->
  <section class="panelWindow">
    <div class="panelHead" tabindex="0">
      <div class="panelTitle">カポタスト</div>
      <button class="panelToggle" id="toggle-capo" type="button" aria-label="カポタストの表示切替" aria-expanded="false" aria-controls="panel-capo">▾</button>
    </div>
    <div class="panel is-hidden" id="panel-capo">
      <div class="row">
        <label>カポ位置
          <select id="capoFret">
            <option value="0">なし</option>
            <option value="1">1フレット</option>
            <option value="2">2フレット</option>
            <option value="3">3フレット</option>
            <option value="4">4フレット</option>
            <option value="5">5フレット</option>
            <option value="6">6フレット</option>
            <option value="7">7フレット</option>
            <option value="8">8フレット</option>
            <option value="9">9フレット</option>
            <option value="10">10フレット</option>
            <option value="11">11フレット</option>
            <option value="12">12フレット</option>
          </select>
        </label>
        <label>左側表示
          <button class="btn" id="capoHideLeftBtn" type="button" aria-pressed="true">カポより左を非表示: ON</button>
        </label>
        <label>フレット数表示
          <select id="fretNumberMode">
            <option value="absolute">絶対フレット数</option>
            <option value="relative">相対フレット数</option>
          </select>
        </label>
      </div>
    </div>
  </section>

  <!-- ハイライト -->
  <section class="panelWindow">
    <div class="panelHead" tabindex="0">
      <div class="panelTitle">スケール＆コード</div>
      <button class="panelToggle" id="toggle-highlight" type="button" aria-label="ハイライトの表示切替" aria-expanded="false" aria-controls="panel-highlight">▾</button>
    </div>
    <div class="panel is-hidden" id="panel-highlight">
      <div class="row">
        <label>スケール表示
          <select id="scaleType">
            <option value="off">オフ</option>
            <option value="major">メジャー</option>
            <option value="minor">ナチュラルマイナー</option>
          </select>
        </label>
        <label>スケール Key
          <select id="scaleRoot"></select>
        </label>
      </div>

      <div class="row">
        <label>コード表示
          <select id="chordOn">
            <option value="off">オフ</option>
            <option value="on">オン</option>
          </select>
        </label>
        <label>コード Root
          <select id="chordRoot"></select>
        </label>
        <label>コードタイプ
          <select id="chordQuality"></select>
        </label>
      </div>
    </div>
  </section>

  <!-- カラーマーカー -->
  <section class="panelWindow">
    <div class="panelHead" tabindex="0">
      <div class="panelTitle">カラーマーカー</div>
      <button class="panelToggle" id="toggle-markshare" type="button" aria-label="カラーマーカーの表示切替" aria-expanded="false" aria-controls="panel-markshare">▾</button>
    </div>
    <div class="panel is-hidden" id="panel-markshare">
      <div class="row">
        <label>描画モード
          <select id="drawMode">
            <option value="on">オン</option>
            <option value="off">オフ</option>
          </select>
        </label>

        <label>形
          <div class="pillGroup" aria-label="形">
            <button class="pill" id="shapeCircle" aria-pressed="true" type="button">◯</button>
            <button class="pill" id="shapeSquare" aria-pressed="false" type="button">▢</button>
          </div>
        </label>

        <label>色
          <div class="pillGroup" aria-label="色">
            <button class="pill" id="colorRed" aria-pressed="true" type="button"><span class="colorDot" style="background:var(--mk-red)"></span>赤</button>
            <button class="pill" id="colorGreen" aria-pressed="false" type="button"><span class="colorDot" style="background:var(--mk-green)"></span>緑</button>
            <button class="pill" id="colorYellow" aria-pressed="false" type="button"><span class="colorDot" style="background:var(--mk-yellow)"></span>黄</button>
          </div>
        </label>

        <label>操作
          <button class="btn" id="clearMarksBtn" type="button">マーク全削除</button>
        </label>

      </div>
    </div>
  </section>

  <!-- always visible bottom-right -->
  <div class="exportBtnWrap">
    <span class="themeLabel">テーマ</span>
    <select id="themePreset" aria-label="テーマ選択">
      <option value="light">ライト</option>
      <option value="dark">ダーク</option>
    </select>
    <button class="btn" id="copyLinkBtn" type="button">共有リンクをコピー</button>
    <button class="btn btnPrimary" id="makePngBtn" type="button">画像出力</button>
  </div>
</div>

<div class="boardWrap">
  <div id="board"></div>
</div>
<div class="siteFooter">© 2026 Yurito. All rights reserved.</div>

<!-- PNG Modal -->
<div class="modalBack" id="pngModalBack" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-label="画像書き出し">
    <div class="modalHead">
      <div class="modalTitle">画像プレビュー</div>
      <button class="btn" id="closeModalBtn" type="button">閉じる</button>
    </div>
    <div class="modalBody">
      <img id="pngPreview" class="previewImg" alt="画像プレビュー（読み込み中）" />
      <div class="modalActions">
        <button class="btn" id="savePngBtn" type="button" disabled>保存</button>
        <button class="btn" id="sharePngBtn" type="button" disabled>共有</button>
      </div>
    </div>
  </div>
</div>

<script>
/* =========================
   Notes / Display
========================= */
const NOTES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const SHARP_TO_FLAT = { "C#":"Db","D#":"Eb","F#":"Gb","G#":"Ab","A#":"Bb" };
const NOTE_TO_SOLFEGE = {
  "C":"ド","C#":"ド#","Db":"レb",
  "D":"レ","D#":"レ#","Eb":"ミb",
  "E":"ミ",
  "F":"ファ","F#":"ファ#","Gb":"ソb",
  "G":"ソ","G#":"ソ#","Ab":"ラb",
  "A":"ラ","A#":"ラ#","Bb":"シb",
  "B":"シ"
};

const THEME_PRESETS = {
  light: {
    "--ui-text":"#111827",
    "--ui-title":"#0f172a",
    "--ui-border":"#d7deea",
    "--ui-muted":"#5b6475",
    "--ui-accent":"#2f6fed",
    "--ui-accent-soft":"rgba(47,111,237,.2)",
    "--ui-accent-strong":"#2f6fed",
    "--ui-bg":"#f4f7fb",
    "--ui-surface":"#ffffff",
    "--ui-surface-soft":"#f8faff",
    "--ui-body-grad-start":"#eef4ff",
    "--ui-body-grad-end":"#f2f6fc",
    "--ui-panel-head-border":"#e8edf6",
    "--ui-panel-head-start":"#fbfdff",
    "--ui-panel-head-end":"#f3f7ff",
    "--ui-panel-title":"#1e293b",
    "--ui-toggle-border":"#d3dbeb",
    "--ui-toggle-text":"#2c3e66",
    "--ui-field-border":"#ced6e6",
    "--ui-field-bg":"#ffffff",
    "--ui-field-text":"#111827",
    "--ui-pill-border":"#cfd8e8",
    "--ui-board-bg-start":"#ffffff",
    "--ui-board-bg-end":"#f8fbff",
    "--ui-svg-bg":"#ffffff",
    "--ui-svg-text":"#111",
    "--ui-fret-line":"#333",
    "--ui-string":"#444",
    "--ui-dot":"#d9d9d9",
    "--ui-footer":"#666",
    "--ui-btn-grad-start":"#3f7df5",
    "--ui-btn-grad-end":"#2f6fed",
    "--note-stroke":"#cfd7e6",
    "--note-stroke-strong":"#223047",
    "--mk-red":"#e45757",
    "--mk-green":"#2fbf9f",
    "--mk-yellow":"#f2b84b",
    "--fill-scale":"#e8f1ff",
    "--fill-chord":"#ffe8cc",
    "--fill-both":"#dff6ea",
  },
  dark: {
    "--ui-text":"#e6ebff",
    "--ui-title":"#f1f5ff",
    "--ui-border":"#2f3940",
    "--ui-muted":"#91a3c3",
    "--ui-accent":"#6b8df2",
    "--ui-accent-soft":"rgba(107,141,242,.28)",
    "--ui-accent-strong":"#5a73bf",
    "--ui-bg":"#0b0b0d",
    "--ui-surface":"#171b22",
    "--ui-surface-soft":"#12161d",
    "--ui-body-grad-start":"#0f131a",
    "--ui-body-grad-end":"#0b0b0d",
    "--ui-panel-head-border":"#2f3940",
    "--ui-panel-head-start":"#1b2230",
    "--ui-panel-head-end":"#161c27",
    "--ui-panel-title":"#dfe7ff",
    "--ui-toggle-border":"#445472",
    "--ui-toggle-text":"#cfd9ff",
    "--ui-field-border":"#3a475f",
    "--ui-field-bg":"#111722",
    "--ui-field-text":"#e6ebff",
    "--ui-pill-border":"#3a475f",
    "--ui-board-bg-start":"#111722",
    "--ui-board-bg-end":"#10151f",
    "--ui-svg-bg":"#0f1520",
    "--ui-svg-text":"#e7edff",
    "--ui-fret-line":"#6f83b3",
    "--ui-string":"#7d8cab",
    "--ui-dot":"#6177aa",
    "--ui-footer":"#9aa8ca",
    "--ui-btn-grad-start":"#6b8df2",
    "--ui-btn-grad-end":"#5a73bf",
    "--note-stroke":"#5f739f",
    "--note-stroke-strong":"#b7c8ef",
    "--mk-red":"#ff7f82",
    "--mk-green":"#64dfc5",
    "--mk-yellow":"#ffd06b",
    "--fill-scale":"#25385f",
    "--fill-chord":"#5b4a2d",
    "--fill-both":"#294d45",
  },
};

const NOTE_CHOICES = [
  { label:"C", sharp:"C" },
  { label:"C#/Db", sharp:"C#" },
  { label:"D", sharp:"D" },
  { label:"D#/Eb", sharp:"D#" },
  { label:"E", sharp:"E" },
  { label:"F", sharp:"F" },
  { label:"F#/Gb", sharp:"F#" },
  { label:"G", sharp:"G" },
  { label:"G#/Ab", sharp:"G#" },
  { label:"A", sharp:"A" },
  { label:"A#/Bb", sharp:"A#" },
  { label:"B", sharp:"B" },
];

const idx = (n) => NOTES.indexOf(n);

function toDisplayAbc(noteSharp, mode){
  if (mode === "sharp") return noteSharp;
  const flatRaw = SHARP_TO_FLAT[noteSharp] ?? noteSharp;
  const flat = flatRaw;
  if (mode === "flat") return flat;
  if (SHARP_TO_FLAT[noteSharp]) return `${noteSharp}/${flat}`;
  return noteSharp;
}

function toDisplaySolfege(noteSharp, mode){
  if (mode === "sharp") return NOTE_TO_SOLFEGE[noteSharp] ?? noteSharp;
  const flatRaw = SHARP_TO_FLAT[noteSharp] ?? noteSharp;
  if (mode === "flat") return NOTE_TO_SOLFEGE[flatRaw] ?? flatRaw;
  if (SHARP_TO_FLAT[noteSharp]){
    const sharp = NOTE_TO_SOLFEGE[noteSharp] ?? noteSharp;
    const flat = NOTE_TO_SOLFEGE[flatRaw] ?? flatRaw;
    return `${sharp}/${flat}`;
  }
  return NOTE_TO_SOLFEGE[noteSharp] ?? noteSharp;
}

function toDisplay(noteSharp, accMode, labelMode){
  if (labelMode === "solfege") return toDisplaySolfege(noteSharp, accMode);
  return toDisplayAbc(noteSharp, accMode);
}

function calcNoteFontSize(displayText, labelMode){
  if (displayText.includes("/")){
    // Slash notation is the widest (e.g. C#/Db, ド#/レb)
    return labelMode === "solfege" ? 8.0 : 11.5;
  }
  if (labelMode === "solfege"){
    // Solfege labels can be wider (e.g. ファ#)
    if (displayText.length >= 3) return 11.2;
    if (displayText.length === 2) return 12.2;
  }
  return 13.5;
}

function normalizeShowNoteNames(value){
  if (value === "on") return "abc";
  if (value === "off") return "off";
  if (value === "abc" || value === "solfege") return value;
  return "abc";
}

/* =========================
   Scale / Chord
========================= */
const MAJOR = [0,2,4,5,7,9,11];
const MINOR = [0,2,3,5,7,8,10];

function buildScaleSet(rootSharp, type){
  if (type === "off") return null;
  const base = idx(rootSharp);
  const steps = (type === "major") ? MAJOR : MINOR;
  return new Set(steps.map(s => (base + s) % 12));
}

const CHORD_QUALITIES = [
  { id:"M",    label:"M (1 3 5)",              semis:[0,4,7] },
  { id:"m",    label:"m (1 b3 5)",             semis:[0,3,7] },
  { id:"sus2", label:"sus2 (1 2 5)",           semis:[0,2,7] },
  { id:"sus4", label:"sus4 (1 4 5)",           semis:[0,5,7] },
  { id:"dim",  label:"dim (1 b3 b5)",          semis:[0,3,6] },
  { id:"aug",  label:"aug (1 3 #5)",           semis:[0,4,8] },
  { id:"7",    label:"7 (1 3 5 b7)",           semis:[0,4,7,10] },
  { id:"M7",   label:"M7 (1 3 5 7)",           semis:[0,4,7,11] },
  { id:"m7",   label:"m7 (1 b3 5 b7)",         semis:[0,3,7,10] },
  { id:"mM7",  label:"mM7 (1 b3 5 7)",         semis:[0,3,7,11] },
  { id:"m7b5", label:"m7b5 (1 b3 b5 b7)",      semis:[0,3,6,10] },
  { id:"dim7", label:"dim7 (1 b3 b5 bb7)",     semis:[0,3,6,9] },
];

function buildChordSet(rootSharp, qualityId){
  const q = CHORD_QUALITIES.find(x => x.id === qualityId) ?? CHORD_QUALITIES[0];
  const base = idx(rootSharp);
  return new Set(q.semis.map(s => (base + s) % 12));
}

/* =========================
   Markers (position-based)
   key: "s{0-5}-f{0..}"
========================= */
const markers = new Map();
function markerKey(stringIndex, fret){ return `s${stringIndex}-f${fret}`; }
function sameMarker(a,b){ return a && b && a.shape===b.shape && a.color===b.color; }

/* =========================
   Helpers: view range clamp
========================= */
const FRET_MIN = 1;
const FRET_LIMIT = 36;

function clampViewRange(){
  let s = Number(els.viewStart.value);
  let e = Number(els.viewEnd.value);
  if (!Number.isFinite(s)) s = FRET_MIN;
  if (!Number.isFinite(e)) e = 12;

  s = Math.min(FRET_LIMIT, Math.max(FRET_MIN, s));
  e = Math.min(FRET_LIMIT, Math.max(FRET_MIN, e));
  if (e < s) e = s;

  els.viewStart.value = String(s);
  els.viewEnd.value = String(e);

  return { viewStart: s, viewEnd: e };
}

/* =========================
   SVG Drawing
========================= */
function svgEl(name, attrs = {}){
  const el = document.createElementNS("http://www.w3.org/2000/svg", name);
  for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, String(v));
  return el;
}
function cssVar(name){
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

function fitBoardSvgSize(svg, intrinsicWidth){
  const wrap = els.board.parentElement;
  const wrapWidth = wrap ? wrap.clientWidth - 28 : intrinsicWidth;

  // Fit to viewport, but keep scale in a comfortable range.
  const fitScale = wrapWidth / intrinsicWidth;
  const minScale = 0.6;
  const maxScale = 1.25;
  const scale = Math.max(minScale, Math.min(maxScale, fitScale));

  svg.style.width = `${Math.round(intrinsicWidth * scale)}px`;
  svg.style.height = "auto";
}

function drawFretboard(){
  const boardWrapEl = els.board.parentElement;
  const prevScrollLeft = boardWrapEl ? boardWrapEl.scrollLeft : 0;
  const prevScrollTop = boardWrapEl ? boardWrapEl.scrollTop : 0;

  const { viewStart, viewEnd } = clampViewRange();
  const mode = els.accMode.value;
  const capoFret = Math.max(0, Math.min(12, Number(els.capoFret?.value ?? 0)));
  const hideLeftOfCapo = (els.capoHideLeftBtn?.getAttribute("aria-pressed") === "true");
  const fretNumberMode = els.fretNumberMode?.value ?? "absolute";
  const relativeShift = (fretNumberMode === "relative" && capoFret > 0) ? (1 - capoFret) : 0;
  const displayFretNum = (f) => String(f + relativeShift);
  const renderStart = (hideLeftOfCapo && capoFret > 0) ? Math.max(viewStart, capoFret) : viewStart;
  const showOpenArea = !(hideLeftOfCapo && capoFret > 0);

  const labelMode = normalizeShowNoteNames(els.showNoteNames.value);

  const scaleType = els.scaleType.value;
  const scaleRoot = els.scaleRoot.value;
  const scaleSet = buildScaleSet(scaleRoot, scaleType);

  const chordEnabled = (els.chordOn.value === "on");
  const chordRoot = els.chordRoot.value;
  const chordQuality = els.chordQuality.value;
  const chordSet = chordEnabled ? buildChordSet(chordRoot, chordQuality) : null;

  // Display order: top 1st string -> bottom 6th string
  const tuning = tuningSelectEls.map(s => s.value); // [6..1]
  const strings = [
    { open: tuning[5] }, // 1
    { open: tuning[4] }, // 2
    { open: tuning[3] }, // 3
    { open: tuning[2] }, // 4
    { open: tuning[1] }, // 5
    { open: tuning[0] }, // 6
  ];

  // Layout
  const topPad = 56;
  const leftPad = 56;
  const rightPad = 18;
  const bottomPad = 22;

  const cellW = 76;
  const nutX = leftPad + 46;
  const openX = nutX - cellW * 0.62;

  const boardH = 360;
  const footerH = 36;
  const yTop = topPad + 38;
  const yBottom = boardH - bottomPad;
  const stringGap = (yBottom - yTop) / 5;

  // Columns: only viewStart..viewEnd
  const visibleFrets = [];
  for (let f=renderStart; f<=viewEnd; f++) visibleFrets.push(f);

  const colCount = visibleFrets.length;
  const width = nutX + (colCount * cellW) + rightPad;
  const height = boardH + footerH;

  const svg = svgEl("svg", {
    width,
    height,
    viewBox: `0 0 ${width} ${height}`,
    preserveAspectRatio: "xMinYMin meet",
    role: "img",
    "aria-label": "ギター指板"
  });

  svg.appendChild(svgEl("rect", { x:0, y:0, width, height, fill:cssVar("--ui-svg-bg") }));
  fitBoardSvgSize(svg, width);

  // Labels: open
  if (showOpenArea){
    const x0 = openX;
    svg.appendChild(svgEl("text", {
      x:x0, y:20, "text-anchor":"middle",
      "font-size": 11, "font-weight": 700, fill: cssVar("--ui-muted"),
      "font-family": '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif'
    })).textContent = "開放弦";

    svg.appendChild(svgEl("text", {
      x:x0, y:42, "text-anchor":"middle",
      "font-size": 14, "font-weight": 700, fill:cssVar("--ui-svg-text"),
      "font-family": '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif'
    })).textContent = displayFretNum(0);
  }

  // Fret numbers (only visible)
  const emph = new Set([3,5,7,9,12]);
  for (let i=0; i<visibleFrets.length; i++){
    const f = visibleFrets[i];
    const x = nutX + (i + 0.5) * cellW;
    const isEm = emph.has(f);
    svg.appendChild(svgEl("text", {
      x, y:42, "text-anchor":"middle",
      "font-size": isEm ? 15 : 14,
      "font-weight": isEm ? 700 : 600,
      fill: isEm ? cssVar("--ui-svg-text") : cssVar("--ui-muted"),
      "font-family": '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif'
    })).textContent = displayFretNum(f);
  }

  // Nut
  svg.appendChild(svgEl("line", {
    x1:nutX, y1:yTop-14, x2:nutX, y2:yBottom+14,
    stroke: cssVar("--note-stroke-strong"), "stroke-width": 4, "stroke-linecap":"round"
  }));

  // Frets (only visible)
  for (let i=0; i<visibleFrets.length; i++){
    const f = visibleFrets[i];
    const x = nutX + (i+1) * cellW;
    svg.appendChild(svgEl("line", {
      x1:x, y1:yTop-14, x2:x, y2:yBottom+14,
      stroke: cssVar("--ui-fret-line"),
      "stroke-width": (f===12 ? 2.8 : 1.3),
      "stroke-linecap":"round"
    }));
  }

  // Capo bar (SVG) on selected fret, if visible.
  if (capoFret > 0 && capoFret >= renderStart && capoFret <= viewEnd){
    const iCapo = capoFret - renderStart;
    const xCapo = nutX + (iCapo + 1) * cellW;
    svg.appendChild(svgEl("rect", {
      x: xCapo - 4,
      y: yTop - 14,
      width: 8,
      height: (yBottom - yTop) + 28,
      fill: cssVar("--ui-svg-text")
    }));
  }

  // Position dots (only if within visible)
  for (const f of [3,5,7,9,12]){
    if (f < renderStart || f > viewEnd) continue;
    const i = f - renderStart;
    const x = nutX + (i + 0.5) * cellW;
    if (f===12){
      const y1 = yTop + stringGap * 1.6;
      const y2 = yTop + stringGap * 3.4;
      svg.appendChild(svgEl("circle", { cx:x, cy:y1, r:5.2, fill:cssVar("--ui-dot") }));
      svg.appendChild(svgEl("circle", { cx:x, cy:y2, r:5.2, fill:cssVar("--ui-dot") }));
    } else {
      const cy = (yTop+yBottom)/2;
      svg.appendChild(svgEl("circle", { cx:x, cy:cy, r:5.2, fill:cssVar("--ui-dot") }));
    }
  }

  // Strings
  for (let s=0; s<6; s++){
    const y = yTop + s * stringGap;
    const stringNo = s + 1;
    const thick = 3.1 - (stringNo-1)*0.33;
    svg.appendChild(svgEl("line", {
      x1: showOpenArea ? (openX-18) : (nutX-10), y1:y, x2: nutX + colCount*cellW + 10, y2:y,
      stroke: cssVar("--ui-string"), "stroke-width": Math.max(1.2, thick),
      "stroke-linecap":"round", opacity:0.95
    }));
  }

  // String numbers
  for (let s=0; s<6; s++){
    const y = yTop + s*stringGap + 6;
    svg.appendChild(svgEl("text", {
      x: 24, y, "text-anchor":"middle",
      "font-size": 13, "font-weight": 700, fill: cssVar("--ui-muted"),
      "font-family": '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif'
    })).textContent = String(s+1);
  }

  // Styles for notes
  const fillScale = cssVar("--fill-scale");
  const fillChord = cssVar("--fill-chord");
  const fillBoth  = cssVar("--fill-both");

  const normalSW = 1.3;
  const openSW = 3.0;
  const fret12SW = 2.6;

  // Note/marker size tuning
  const noteR = 18;
  const markerSW = openSW * 1.6;
  const markerWhiteSW = markerSW + 1.2;
  // Keep marker outside the note, with a target radius range of 18..21.
  const markerMinR = 18;
  const markerMaxR = 21;
  const safeOuterR = Math.max(markerMinR, Math.min(markerMaxR, (stringGap * 0.5) - (markerSW * 0.55)));
  const markerR = Math.max(noteR + 0.8, safeOuterR);
  const markerDiameter = markerR * 2;

  function getFill(noteIndex){
    const inScale = scaleSet ? scaleSet.has(noteIndex) : false;
    const inChord = chordSet ? chordSet.has(noteIndex) : false;
    if (inScale && inChord) return fillBoth;
    if (inChord) return fillChord;
    if (inScale) return fillScale;
    return cssVar("--ui-svg-bg");
  }
  function markerColor(color){
    if (color==="green") return cssVar("--mk-green");
    if (color==="yellow") return cssVar("--mk-yellow");
    return cssVar("--mk-red");
  }

  const drawOn = () => (
    els.drawMode.value === "on" &&
    !document.getElementById("panel-markshare").classList.contains("is-hidden")
  );
  const showMarkers = (els.drawMode.value === "on");

  // OPEN (fret 0) + visible frets
  const fretsToRender = showOpenArea ? [0, ...visibleFrets] : [...visibleFrets];

  for (let s=0; s<6; s++){
    const y = yTop + s * stringGap;
    const base = idx(strings[s].open);

    for (const f of fretsToRender){
      // Absolute pitch on the fretboard does not change with capo.
      const noteIndex = (base + f) % 12;
      const noteSharp = NOTES[noteIndex];

      let x;
      if (f === 0){
        x = openX;
      } else {
        const i = f - renderStart; // 0..colCount-1
        x = nutX + (i + 0.5) * cellW;
      }

      const fill = getFill(noteIndex);

      let stroke = cssVar("--note-stroke");
      let sw = normalSW;

      if (f === 0){
        stroke = cssVar("--note-stroke-strong");
        sw = openSW;
      } else if (capoFret > 0 && f === capoFret){
        // Emphasize capo position similar to open strings.
        stroke = cssVar("--note-stroke-strong");
        sw = openSW;
      } else if (f === 12){
        stroke = cssVar("--note-stroke-strong");
        sw = fret12SW;
      }

      svg.appendChild(svgEl("circle", {
        cx:x, cy:y, r:noteR,
        fill,
        stroke,
        "stroke-width": sw
      }));

      if (labelMode !== "off"){
        const displayText = toDisplay(noteSharp, mode, labelMode);
        const noteFontSize = calcNoteFontSize(displayText, labelMode);
        const noteTextY = y + (noteFontSize * 0.43);
        const text = svgEl("text", {
          x, y: noteTextY,
          "text-anchor":"middle",
          "font-size": noteFontSize,
          "font-weight": 600,
          fill:cssVar("--ui-svg-text"),
          "font-family": '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif'
        });
        text.textContent = displayText;
        svg.appendChild(text);
      }

      // Marker overlay (circle diameter == square side)
      const mk = markers.get(markerKey(s,f));
      if (showMarkers && mk){
        const mkStroke = markerColor(mk.color);

        if (mk.shape === "circle"){
          svg.appendChild(svgEl("circle", {
            cx:x, cy:y, r: markerR,
            fill:"none",
            stroke:cssVar("--ui-svg-bg"),
            "stroke-width": markerWhiteSW,
            "stroke-linecap":"round"
          }));
          svg.appendChild(svgEl("circle", {
            cx:x, cy:y, r: markerR,
            fill:"none",
            stroke: mkStroke,
            "stroke-width": markerSW,
            "stroke-linecap":"round"
          }));
        } else {
          const side = markerDiameter;      // square side equals marker diameter
          const x0 = x - side/2;
          const y0 = y - side/2;

          svg.appendChild(svgEl("rect", {
            x:x0, y:y0, width:side, height:side,
            rx:6.5, ry:6.5,
            fill:"none",
            stroke:cssVar("--ui-svg-bg"),
            "stroke-width": markerWhiteSW,
            "stroke-linejoin":"round"
          }));
          svg.appendChild(svgEl("rect", {
            x:x0, y:y0, width:side, height:side,
            rx:6.5, ry:6.5,
            fill:"none",
            stroke: mkStroke,
            "stroke-width": markerSW,
            "stroke-linejoin":"round"
          }));
        }
      }

      // Tap target
      let hitX, hitW;
      if (f === 0){
        hitX = x - cellW/2;
        hitW = cellW;
      } else {
        hitX = x - cellW/2;
        hitW = cellW;
      }
      const hit = svgEl("rect", {
        x: hitX,
        y: y - stringGap/2,
        width: hitW,
        height: stringGap,
        fill: "transparent",
        cursor: drawOn() ? "pointer" : "default",
        "data-s": String(s),
        "data-f": String(f)
      });

      hit.addEventListener("click", () => {
        if (!drawOn()) return;

        const sIdx = Number(hit.getAttribute("data-s"));
        const fret = Number(hit.getAttribute("data-f"));
        const key = markerKey(sIdx, fret);

        const next = { shape: pen.shape, color: pen.color };
        const cur = markers.get(key);

        if (sameMarker(cur, next)) markers.delete(key);
        else markers.set(key, next);

        drawFretboard();
      });

      svg.appendChild(hit);
    }
  }

  // Footer title + credit (included in PNG export), 2-line layout at bottom-right.
  svg.appendChild(svgEl("text", {
    x: width - 14,
    y: boardH + 14,
    "text-anchor":"end",
    "font-size": 9.8,
    "font-weight": 500,
    fill:cssVar("--ui-footer"),
    "font-family": '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif'
  })).textContent = APP_TITLE;
  svg.appendChild(svgEl("text", {
    x: width - 14,
    y: boardH + footerH - 8,
    "text-anchor":"end",
    "font-size": 9.8,
    "font-weight": 500,
    fill:cssVar("--ui-footer"),
    "font-family": '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif'
  })).textContent = "© 2026 Yurito. All rights reserved.";

  els.board.innerHTML = "";
  els.board.appendChild(svg);
  window.__FRETBOARD_SVG__ = svg;

  // Keep horizontal/vertical scroll position stable across redraws.
  if (boardWrapEl){
    boardWrapEl.scrollLeft = prevScrollLeft;
    boardWrapEl.scrollTop = prevScrollTop;
  }
}

/* =========================
   PNG Export (Modal)
========================= */
let lastPngBlob = null;
let lastPngUrl = null;

function openModal(){
  els.modalBack.classList.add("show");
  els.modalBack.setAttribute("aria-hidden", "false");
}
function closeModal(){
  els.modalBack.classList.remove("show");
  els.modalBack.setAttribute("aria-hidden", "true");
}
els.closeModalBtn.addEventListener("click", closeModal);
els.modalBack.addEventListener("click", (e) => { if (e.target === els.modalBack) closeModal(); });

function setPreviewFromBlob(blob){
  if (lastPngUrl) URL.revokeObjectURL(lastPngUrl);
  lastPngBlob = blob;
  lastPngUrl = URL.createObjectURL(blob);
  els.pngPreview.src = lastPngUrl;
  els.savePngBtn.disabled = false;
  els.sharePngBtn.disabled = false;
}

function serializeSvgWithSize(svg){
  const serializer = new XMLSerializer();
  const vb = svg.viewBox.baseVal;
  const w = Math.ceil(vb.width);
  const h = Math.ceil(vb.height);

  const clone = svg.cloneNode(true);
  clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
  clone.setAttribute("width", String(w));
  clone.setAttribute("height", String(h));
  clone.setAttribute("preserveAspectRatio", "xMinYMin meet");
  if (!clone.getAttribute("viewBox")) clone.setAttribute("viewBox", `0 0 ${w} ${h}`);

  return { svgText: serializer.serializeToString(clone), w, h };
}

function svgToPngBlob(svg, scale=2){
  return new Promise((resolve, reject) => {
    try{
      const { svgText, w, h } = serializeSvgWithSize(svg);
      const svgBlob = new Blob([svgText], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(svgBlob);

      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        canvas.width = w * scale;
        canvas.height = h * scale;

        const ctx = canvas.getContext("2d");
        ctx.setTransform(scale, 0, 0, scale, 0, 0);
        ctx.clearRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);

        URL.revokeObjectURL(url);

        canvas.toBlob((blob) => {
          if (!blob) return reject(new Error("画像出力に失敗しました"));
          resolve(blob);
        }, "image/png");
      };
      img.onerror = () => {
        URL.revokeObjectURL(url);
        reject(new Error("SVG読み込みに失敗しました"));
      };
      img.src = url;
    } catch(err){
      reject(err);
    }
  });
}

els.makePngBtn.addEventListener("click", async () => {
  const svg = window.__FRETBOARD_SVG__;
  if (!svg) return;

  openModal();
  els.pngPreview.removeAttribute("src");
  els.savePngBtn.disabled = true;
  els.sharePngBtn.disabled = true;

  els.makePngBtn.disabled = true;
  els.makePngBtn.textContent = "画像出力中...";

  try{
    const blob = await svgToPngBlob(svg, 2);
    setPreviewFromBlob(blob);
  } catch(e){
    alert(e?.message ?? String(e));
    closeModal();
  } finally{
    els.makePngBtn.disabled = false;
    els.makePngBtn.textContent = "画像出力";
  }
});

els.savePngBtn.addEventListener("click", () => {
  if (!lastPngBlob) return;
  const a = document.createElement("a");
  a.href = lastPngUrl;
  a.download = "fretboard.png";
  document.body.appendChild(a);
  a.click();
  a.remove();
});

els.sharePngBtn.addEventListener("click", async () => {
  if (!lastPngBlob) return;
  const file = new File([lastPngBlob], "fretboard.png", { type: "image/png" });

  try{
    if (navigator.canShare && navigator.canShare({ files: [file] })){
      await navigator.share({ files: [file], title: "ギター指板", text: "" });
      return;
    }
  } catch(_) {}

  window.open(lastPngUrl, "_blank");
});

els.clearMarksBtn.addEventListener("click", () => {
  markers.clear();
  drawFretboard();
});

/* =========================
   State share link (URL)
========================= */
function b64encode(str){
  return btoa(unescape(encodeURIComponent(str)));
}
function b64decode(str){
  return decodeURIComponent(escape(atob(str)));
}

function getState(){
  const { viewStart, viewEnd } = clampViewRange();
  const tuning = tuningSelectEls.map(s => s.value); // 6->1
  const marks = Array.from(markers.entries()); // [ [key, {shape,color}], ... ]
  return {
    v: 1,
    tuning,
    viewStart,
    viewEnd,
    capoFret: els.capoFret.value,
    capoHideLeft: (els.capoHideLeftBtn.getAttribute("aria-pressed") === "true"),
    fretNumberMode: els.fretNumberMode.value,
    themePreset: normalizeThemePreset(els.themePreset.value),
    showNoteNames: els.showNoteNames.value,
    accMode: els.accMode.value,
    scaleType: els.scaleType.value,
    scaleRoot: els.scaleRoot.value,
    chordOn: els.chordOn.value,
    chordRoot: els.chordRoot.value,
    chordQuality: els.chordQuality.value,
    drawMode: els.drawMode.value,
    pen,
    marks
  };
}

function applyState(st){
  try{
    if (!st || typeof st !== "object") return;

    if (Array.isArray(st.tuning) && st.tuning.length === 6){
      // tuning is 6->1
      for (let i=0; i<6; i++){
        if (NOTES.includes(st.tuning[i])) tuningSelectEls[i].value = st.tuning[i];
      }
    }
    if (Number.isFinite(st.viewStart)) els.viewStart.value = String(st.viewStart);
    if (Number.isFinite(st.viewEnd)) els.viewEnd.value = String(st.viewEnd);
    if (st.capoFret !== undefined) els.capoFret.value = String(st.capoFret);
    if (st.capoHideLeft !== undefined){
      const enabled = (typeof st.capoHideLeft === "boolean") ? st.capoHideLeft : (st.capoHideLeft === "on");
      setCapoHideLeft(enabled);
    }
    if (st.fretNumberMode) els.fretNumberMode.value = st.fretNumberMode;
    if (st.themePreset) applyThemePreset(st.themePreset);

    if (st.showNoteNames) els.showNoteNames.value = normalizeShowNoteNames(st.showNoteNames);
    if (st.accMode) els.accMode.value = st.accMode;

    if (st.scaleType) els.scaleType.value = st.scaleType;
    if (st.scaleRoot) els.scaleRoot.value = st.scaleRoot;

    if (st.chordOn) els.chordOn.value = st.chordOn;
    if (st.chordRoot) els.chordRoot.value = st.chordRoot;
    if (st.chordQuality) els.chordQuality.value = st.chordQuality;

    if (st.drawMode) els.drawMode.value = st.drawMode;

    if (st.pen && st.pen.shape && st.pen.color){
      setShape(st.pen.shape);
      setColor(st.pen.color);
    }

    markers.clear();
    if (Array.isArray(st.marks)){
      for (const [k, v] of st.marks){
        if (!k || !v) continue;
        if ((v.shape==="circle"||v.shape==="square") && (v.color==="red"||v.color==="green"||v.color==="yellow")){
          markers.set(k, v);
        }
      }
    }
  } catch(_) {}
}

function buildShareUrl(){
  const st = getState();
  const json = JSON.stringify(st);
  const enc = b64encode(json);
  const url = new URL(location.href);
  url.searchParams.set("s", enc);
  return url.toString();
}

els.copyLinkBtn.addEventListener("click", async () => {
  const url = buildShareUrl();
  try{
    await navigator.clipboard.writeText(url);
    els.copyLinkBtn.textContent = "コピーしました";
    setTimeout(() => (els.copyLinkBtn.textContent = "共有リンクをコピー"), 1200);
  } catch(_) {
    prompt("このURLをコピーして共有してください", url);
  }
});

// Load from URL if exists
(function initFromUrl(){
  const sp = new URLSearchParams(location.search);
  const s = sp.get("s");
  if (!s) return;
  try{
    const json = b64decode(s);
    const st = JSON.parse(json);
    applyState(st);
  } catch(_) {}
})();

/* =========================
   Redraw triggers
========================= */
[
  els.viewStart, els.viewEnd, els.capoFret, els.fretNumberMode,
  els.accMode, els.showNoteNames,
  els.scaleType, els.scaleRoot,
  els.chordOn, els.chordRoot, els.chordQuality,
  els.drawMode
].forEach(el => el.addEventListener("change", drawFretboard));

tuningSelectEls.forEach(sel => sel.addEventListener("change", drawFretboard));

/* =========================
   First draw
========================= */
drawFretboard();
window.addEventListener("resize", drawFretboard);
</script>
